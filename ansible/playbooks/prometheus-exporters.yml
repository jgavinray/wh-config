---
- name: Deploy Prometheus Exporters to Fleet
  hosts: all
  become: true
  vars_files:
    - vars/versions.yml
  vars:
    node_exporter_port: 9100
    dcgm_exporter_port: 9400

  tasks:
    # =====================================================
    # Node Exporter Installation
    # =====================================================
    - name: Check if node_exporter is already installed
      stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_binary
      changed_when: false

    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}-linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}-linux-amd64.tar.gz"
        mode: '0644'
      when: not node_exporter_binary.stat.exists
      register: node_exporter_download

    - name: Extract node_exporter archive
      unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}-linux-amd64.tar.gz"
        dest: /tmp/
        remote_src: yes
        creates: "/tmp/node_exporter-{{ node_exporter_version }}-linux-amd64/node_exporter"
      when: node_exporter_download.changed

    - name: Copy node_exporter binary to /usr/local/bin
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}-linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: yes
      when: node_exporter_download.changed
      notify: Restart node_exporter

    - name: Clean up node_exporter archive
      file:
        path: "/tmp/node_exporter-{{ node_exporter_version }}-linux-amd64.tar.gz"
        state: absent
      when: node_exporter_download.changed

    - name: Create node_exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=root
          ExecStart=/usr/local/bin/node_exporter --web.listen-address=:{{ node_exporter_port }}

          [Install]
          WantedBy=multi-user.target
      notify: Restart node_exporter

    - name: Enable and start node_exporter service
      systemd:
        name: node_exporter
        enabled: yes
        state: started
        daemon_reload: yes

    # =====================================================
    # DCGM Exporter Installation (NVIDIA GPU metrics)
    # =====================================================
    - name: Check if DCGM exporter is already installed
      stat:
        path: /usr/bin/dcgm_exporter
      register: dcgm_exporter_binary
      changed_when: false
      when: inventory_hostname in groups["spark"]

    - name: Get DCGM exporter latest release info
      uri:
        url: https://api.github.com/repos/NVIDIA/dcgm-exporter/releases/latest
        return_content: yes
      register: dcgm_release
      when: 
        - not dcgm_exporter_binary.stat.exists
        - inventory_hostname in groups["spark"]
      changed_when: false

    - name: Set DCGM exporter version
      set_fact:
        dcgm_version: "{{ dcgm_release.json.tag_name | regex_replace('^v', '') }}"
      when: 
        - not dcgm_exporter_binary.stat.exists
        - inventory_hostname in groups["spark"]

    - name: Download DCGM exporter
      get_url:
        url: "https://github.com/NVIDIA/dcgm-exporter/releases/download/v{{ dcgm_version }}/dcgm-exporter-{{ dcgm_version }}-linux-x86_64.tar.gz"
        dest: "/tmp/dcgm-exporter-{{ dcgm_version }}-linux-x86_64.tar.gz"
        mode: '0644'
      when: 
        - not dcgm_exporter_binary.stat.exists
        - inventory_hostname in groups["spark"]
      register: dcgm_download

    - name: Extract DCGM exporter archive
      unarchive:
        src: "/tmp/dcgm-exporter-{{ dcgm_version }}-linux-x86_64.tar.gz"
        dest: /tmp/
        remote_src: yes
        creates: "/tmp/dcgm-exporter-{{ dcgm_version }}-linux-x86_64/dcgm_exporter"
      when: 
        - dcgm_download.changed
        - inventory_hostname in groups["spark"]

    - name: Copy DCGM exporter binary to /usr/bin
      copy:
        src: "/tmp/dcgm-exporter-{{ dcgm_version }}-linux-x86_64/dcgm_exporter"
        dest: /usr/bin/dcgm_exporter
        mode: '0755'
        remote_src: yes
      when: 
        - dcgm_download.changed
        - inventory_hostname in groups["spark"]
      notify: Restart dcgm_exporter

    - name: Clean up DCGM exporter archive
      file:
        path: "/tmp/dcgm-exporter-{{ dcgm_version }}-linux-x86_64.tar.gz"
        state: absent
      when: 
        - dcgm_download.changed
        - inventory_hostname in groups["spark"]

    - name: Create DCGM exporter systemd service
      copy:
        dest: /etc/systemd/system/dcgm-exporter.service
        mode: '0644'
        content: |
          [Unit]
          Description=NVIDIA DCGM Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=root
          ExecStart=/usr/bin/dcgm_exporter --metrics-port={{ dcgm_exporter_port }}

          [Install]
          WantedBy=multi-user.target
      when: inventory_hostname in groups["spark"]
      notify: Restart dcgm_exporter

    - name: Enable and start DCGM exporter service
      systemd:
        name: dcgm_exporter
        enabled: yes
        state: started
        daemon_reload: yes
      when: inventory_hostname in groups["spark"]

  handlers:
    - name: Restart node_exporter
      systemd:
        name: node_exporter
        state: restarted

    - name: Restart dcgm_exporter
      systemd:
        name: dcgm_exporter
        state: restarted
